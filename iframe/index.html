<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon" />
    <title>PowerPlayLive - Iframe Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e0033, #3a0068);
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 16px;
        }
        .wrap { width: 100%; max-width: 1200px; }
        h1 { font-size: 1.5rem; margin: 8px 0 14px; color: #ffb347; }
        .player {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-radius: 12px;
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .note { margin-top: 12px; color: #ddd; font-size: 0.95rem; word-break: break-all; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1 id="title">Loading...</h1>
        <div class="player">
            <iframe id="video-frame" src="" sandbox="allow-scripts allow-same-origin allow-presentation" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="note" id="note"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const rawId = params.get("id") || pathParts[pathParts.length - 1] || "";
        const title = params.get("n") || "Live Stream";
        const iframe = document.getElementById("video-frame");
        document.getElementById("title").textContent = title;

        if (!rawId) {
            document.getElementById("title").textContent = "Invalid Stream";
            document.getElementById("note").textContent = "Missing id parameter.";
        } else {
            let src = rawId;
            try {
                if (rawId.startsWith("http://") || rawId.startsWith("https://")) {
                    src = rawId;
                } else {
                    src = atob(rawId);
                }
            } catch (e) {
                try {
                    src = decodeURIComponent(rawId);
                } catch (err) {
                    document.getElementById("title").textContent = "Invalid Stream";
                    document.getElementById("note").textContent = "Could not decode the stream id.";
                    console.error(err);
                    src = "";
                }
            }

            if (src) {
                iframe.src = src;
                document.getElementById("note").textContent = src;
            }
        }
    </script>
</body>
</html>
