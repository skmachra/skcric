name: Update Stream by Id

on:
  workflow_dispatch:
    inputs:
      id:
        description: "Stream ID"
        required: true
        type: string

      file:
        description: "HTML file path"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Stream Data
        env:
          STREAM_ID: ${{ github.event.inputs.id }}
        run: |
          cat > fetch.js <<'EOF'
          const fs = require("fs");

          async function main() {
            const id = process.env.STREAM_ID;

            const res = await fetch(
              `https://newwwwapiiiiii.vercel.app/main?id=${id}`,
              {
                headers: {
                  Referer: "https://cricboost.pages.dev/",
                  Origin: "https://cricboost.pages.dev/",
                  "User-Agent": "Mozilla/5.0"
                }
              }
            );

            const data = await res.json();

            console.log(data);

            if (!data.url || !data.k1 || !data.k2) {
              throw new Error("Invalid API response");
            }

            fs.appendFileSync(
              process.env.GITHUB_ENV,
              `STREAM_URL=${data.url}\nCLEARKEY=${data.k1}:${data.k2}\n`
            );
          }

          main();
          EOF

          node fetch.js

      - name: Update HTML File
        env:
          FILE_NAME: ${{ github.event.inputs.file }}
          STREAM_URL: ${{ env.STREAM_URL }}
          CLEARKEY: ${{ env.CLEARKEY }}
        run: node update-stream.js

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Update ${{ github.event.inputs.id }}"
            git push