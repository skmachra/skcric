<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fancode</title>
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Shaka Player v4.16.2 -->
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">
<script>

  function gtag(){dataLayer.push(arguments);}

    <style>
        /* Reset & Fullscreen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .shaka-video-container {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Custom watermark */
        .custom-watermark {
            position: absolute;
            z-index: 40;
            pointer-events: none;
            bottom: 80px;
            right: 20px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.10);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #000;
            color: #fff;
            z-index: 2000;
            font-size: 18px;
            pointer-events: none;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, .15);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ---- Shaka UI overrides ---- */
        .shaka-controls-container {
            background: transparent !important;
        }

        .shaka-bottom-controls {
            padding: 10px 16px;
            display: flex !important;
            flex-direction: column !important;
        }

        /* PROGRESS BAR */
        .shaka-seek-bar-container {
            display: block !important;
            width: 100% !important;
            height: 8px !important;
            margin: 0 0 10px 0 !important;
            padding: 0 !important;
            order: -1 !important;
            position: relative !important;
        }

        .shaka-seek-bar {
            width: 100% !important;
            height: 8px !important;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.15) !important;
            position: relative !important;
        }

        .shaka-seek-bar .shaka-range-element {
            width: 100% !important;
            height: 8px !important;
            border-radius: 50px;
            background: transparent !important;
            position: relative !important;
            -webkit-appearance: none !important;
            appearance: none !important;
            outline: none !important;
        }

        .shaka-seek-bar .shaka-range-element::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff3b30;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.6);
            border: 2px solid #fff;
            margin-top: -5px;
            position: relative;
            z-index: 10;
        }

        .shaka-seek-bar .shaka-range-element::-webkit-slider-runnable-track {
            height: 8px !important;
            border-radius: 50px;
            background: transparent !important;
        }

        .shaka-seek-bar .shaka-range-element::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff3b30;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 12px rgba(255, 59, 48, 0.6);
        }

        .shaka-seek-bar .shaka-range-element::-moz-range-track {
            height: 8px !important;
            border-radius: 50px;
            background: transparent !important;
        }

        /* Time & duration */
        .shaka-current-time,
        .shaka-time-duration {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            padding: 0 8px;
        }

        .shaka-bottom-controls > div {
            display: flex !important;
            align-items: center !important;
            gap: 4px !important;
        }

        .shaka-controls-container button {
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.4));
        }

        .shaka-overflow-menu,
        .shaka-settings-menu {
            border-radius: 12px;
            backdrop-filter: blur(18px);
            background: rgba(20, 20, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .shaka-play-button-container {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
        }

        .shaka-volume-slider {
            width: 60px;
        }

        /* Completely remove telegram popup */
        #telegramModal,
        .modal,
        .modal-content,
        #joinButton,
        #closeButton,
        .btn {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
            width: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
            position: absolute !important;
            z-index: -9999 !important;
            border: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        @media (max-width: 700px) {
            .custom-watermark {
                font-size: 9px;
                bottom: 70px;
                right: 14px;
            }
            .shaka-seek-bar-container {
                height: 6px !important;
            }
            .shaka-seek-bar {
                height: 6px !important;
            }
            .shaka-seek-bar .shaka-range-element::-webkit-slider-thumb {
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>

<div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark">LIVE · FANCODE</div>

    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        Analyzing the video...
    </div>
</div>

<!-- Telegram popup - COMPLETELY REMOVED -->
<div id="telegramModal" class="modal hidden"></div>

<script>
    (function() {
        /* ========== CONFIG ========== */
        const STREAM_URL =
            "https://in-mc-pdlive.fancode.com/mumbai/143351_hindi_hls_e275e99cda1596_1ta-di_h264/index.m3u8";

        /* ========== PLAYER INIT ========== */
        async function initPlayer() {
            const video = document.getElementById('video');
            const container = document.getElementById('player-container');
            const loading = document.getElementById('loading');

            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) {
                alert('Browser not supported for Shaka Player');
                return;
            }

            try {
                const player = new shaka.Player();
                await player.attach(video);

                const ui = new shaka.ui.Overlay(player, container, video);

                ui.configure({
                    addBigPlayButton: true,
                    addSeekBar: true,
                    controlPanelElements: [
                        "mute",
                        "play_pause",
                        "time_and_duration",
                        "spacer",
                        "quality",
                        "picture_in_picture",
                        "fullscreen"
                    ],
                    seekBarColors: {
                        base: "rgba(255,255,255,0.2)",
                        buffered: "rgba(255,255,255,0.4)",
                        played: "#ff3b30"
                    }
                });

                player.configure({
                    streaming: {
                        bufferingGoal: 10,
                        rebufferingGoal: 2,
                        safeSeekOffset: 5,
                        lowLatencyMode: true
                    }
                });

                await player.load(STREAM_URL);

                video.muted = false;
                await video.play().catch(() => {
                    video.muted = true;
                    video.play();
                });

                video.addEventListener('playing', () => {
                    loading.style.display = 'none';
                });

                // FIX: Properly handle pause/resume
                // Remove any conflicting event listeners
                video.removeEventListener('pause', null);

                // Only handle pause if it's not user-initiated (like buffering)
                // We'll use a flag to track user interaction
                let userPaused = false;

                // When user clicks pause button, set flag
                document.addEventListener('click', function(e) {
                    const pauseBtn = e.target.closest('.shaka-play-button');
                    if (pauseBtn) {
                        // Check if video is currently playing
                        if (!video.paused) {
                            userPaused = true;
                        } else {
                            userPaused = false;
                        }
                    }
                });

                // Handle pause event
                video.addEventListener('pause', function() {
                    // If video is paused and it's not the end
                    if (!video.ended && !userPaused) {
                        // This is an automatic pause (buffering, etc.)
                        // Try to resume after a short delay
                        setTimeout(() => {
                            if (video.paused && !video.ended) {
                                video.play().catch(() => {});
                            }
                        }, 500);
                    }
                    // Reset flag after pause
                    setTimeout(() => {
                        userPaused = false;
                    }, 100);
                });

                // Also handle play button clicks through Shaka UI
                // Listen for play event to reset userPaused
                video.addEventListener('play', function() {
                    userPaused = false;
                });

                // Fallback: check every 2 seconds if video is stuck paused
                setInterval(() => {
                    if (video.paused && !video.ended && !userPaused) {
                        // Check if it's been paused for more than 3 seconds
                        video.play().catch(() => {});
                    }
                }, 3000);

                setTimeout(() => {
                    loading.style.display = 'none';
                }, 6000);

                setTimeout(() => {
                    const seekBar = document.querySelector('.shaka-seek-bar-container');
                    if (seekBar) {
                        seekBar.style.display = 'block !important';
                        seekBar.style.visibility = 'visible !important';
                        seekBar.style.opacity = '1 !important';
                    }
                }, 500);

            } catch (e) {
                console.warn('Shaka error, falling back to native HLS:', e);
                video.src = STREAM_URL;
                video.muted = false;
                video.play().catch(() => {
                    video.muted = true;
                    video.play();
                });
                video.addEventListener('playing', () => {
                    loading.style.display = 'none';
                });
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 6000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'flex';
            initPlayer();
        });

    })();
</script>

</body>
</html>
